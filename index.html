<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мағозаи Интернетӣ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 2em;
        }
        
        .cart-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .cart-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        .cart-count {
            background: #ff4757;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .product-info {
            padding: 20px;
        }
        
        .product-category {
            color: #667eea;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .product-price {
            font-size: 24px;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .product-stock {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        
        .add-to-cart {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .add-to-cart:hover {
            background: #764ba2;
        }
        
        .add-to-cart:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            color: #7f8c8d;
        }
        
        .cart-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            align-items: center;
        }
        
        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .cart-item-price {
            color: #27ae60;
            font-weight: bold;
        }
        
        .quantity-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }
        
        .quantity-btn {
            background: #667eea;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }
        
        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .cart-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
            font-size: 24px;
            font-weight: bold;
            text-align: right;
            color: #27ae60;
        }
        
        .checkout-form {
            margin-top: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .checkout-btn {
            width: 100%;
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
        }
        
        .checkout-btn:hover {
            background: #229954;
        }
        
        .empty-cart {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        .admin-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }
        
        .success-message {
            background: #27ae60;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 Мағозаи Интернетӣ</h1>
            <div>
                <button class="cart-btn" onclick="openCart()">
                    Сабад <span class="cart-count" id="cartCount">0</span>
                </button>
                <button class="admin-btn" onclick="openAdmin()">Админ</button>
            </div>
        </header>
        
        <div class="products-grid" id="productsGrid"></div>
        
        <!-- Модали сабад -->
        <div class="modal" id="cartModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Сабади Харид</h2>
                    <button class="close-btn" onclick="closeCart()">&times;</button>
                </div>
                <div id="cartItems"></div>
                <div class="cart-total" id="cartTotal"></div>
                
                <div class="checkout-form" id="checkoutForm" style="display: none;">
                    <h3>Маълумоти Муштарӣ</h3>
                    <div class="form-group">
                        <label>Номи шумо:</label>
                        <input type="text" id="customerName" required>
                    </div>
                    <div class="form-group">
                        <label>Почтаи электронӣ:</label>
                        <input type="email" id="customerEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Рақами телефон:</label>
                        <input type="tel" id="customerPhone" required>
                    </div>
                    <button class="checkout-btn" onclick="submitOrder()">Фармоиш додан</button>
                </div>
            </div>
        </div>
        
        <!-- Модали админ -->
        <div class="modal" id="adminModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Панели Админ</h2>
                    <button class="close-btn" onclick="closeAdmin()">&times;</button>
                </div>
                <h3>Илова кардани маҳсулоти нав</h3>
                <div class="form-group">
                    <label>Номи маҳсулот:</label>
                    <input type="text" id="productName">
                </div>
                <div class="form-group">
                    <label>Нарх:</label>
                    <input type="number" id="productPrice">
                </div>
                <div class="form-group">
                    <label>URL-и тасвир:</label>
                    <input type="text" id="productImage">
                </div>
                <div class="form-group">
                    <label>Категория:</label>
                    <input type="text" id="productCategory">
                </div>
                <div class="form-group">
                    <label>Захира:</label>
                    <input type="number" id="productStock">
                </div>
                <button class="checkout-btn" onclick="addProduct()">Илова кардан</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3000/api';
        let cart = [];
        let products = [];
        
        // Бор кардани маҳсулот
        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                products = await response.json();
                displayProducts();
            } catch (error) {
                console.error('Хатогӣ дар бор кардани маҳсулот:', error);
            }
        }
        
        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <div class="product-category">${product.category}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price} сомонӣ</div>
                        <div class="product-stock">Дар захира: ${product.stock} дона</div>
                        <button class="add-to-cart" onclick="addToCart(${product.id})" 
                                ${product.stock === 0 ? 'disabled' : ''}>
                            ${product.stock === 0 ? 'Тамом шуд' : 'Ба сабад илова кунед'}
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const cartItem = cart.find(item => item.id === productId);
            
            if (cartItem) {
                if (cartItem.quantity < product.stock) {
                    cartItem.quantity++;
                } else {
                    alert('Захираи кофӣ нест!');
                    return;
                }
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartCount();
            showNotification('Ба сабад илова шуд!');
        }
        
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }
        
        function openCart() {
            displayCart();
            document.getElementById('cartModal').classList.add('active');
        }
        
        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }
        
        function displayCart() {
            const cartItemsDiv = document.getElementById('cartItems');
            const checkoutForm = document.getElementById('checkoutForm');
            
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<div class="empty-cart">Сабади шумо холӣ аст</div>';
                document.getElementById('cartTotal').innerHTML = '';
                checkoutForm.style.display = 'none';
                return;
            }
            
            cartItemsDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${item.price} сомонӣ</div>
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="changeQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="quantity-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">Нест кардан</button>
                        </div>
                    </div>
                    <div style="font-weight: bold;">${item.price * item.quantity} сомонӣ</div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').innerHTML = `Ҷамъ: ${total} сомонӣ`;
            checkoutForm.style.display = 'block';
        }
        
        function changeQuantity(productId, change) {
            const cartItem = cart.find(item => item.id === productId);
            const product = products.find(p => p.id === productId);
            
            if (cartItem) {
                const newQuantity = cartItem.quantity + change;
                if (newQuantity > 0 && newQuantity <= product.stock) {
                    cartItem.quantity = newQuantity;
                } else if (newQuantity > product.stock) {
                    alert('Захираи кофӣ нест!');
                    return;
                }
                updateCartCount();
                displayCart();
            }
        }
        
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartCount();
            displayCart();
        }
        
        async function submitOrder() {
            const name = document.getElementById('customerName').value;
            const email = document.getElementById('customerEmail').value;
            const phone = document.getElementById('customerPhone').value;
            
            if (!name || !email || !phone) {
                alert('Лутфан ҳамаи майдонҳоро пур кунед!');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            try {
                const response = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customerName: name,
                        customerEmail: email,
                        customerPhone: phone,
                        items: cart,
                        total: total
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('Фармоиш бо муваффақият сохта шуд! Рақами фармоиш: ' + result.order.id);
                    cart = [];
                    updateCartCount();
                    closeCart();
                    loadProducts();
                } else {
                    alert('Хато: ' + result.message);
                }
            } catch (error) {
                alert('Хатогӣ дар ирсоли фармоиш!');
            }
        }
        
        function openAdmin() {
            document.getElementById('adminModal').classList.add('active');
        }
        
        function closeAdmin() {
            document.getElementById('adminModal').classList.remove('active');
        }
        
        async function addProduct() {
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            const image = document.getElementById('productImage').value;
            const category = document.getElementById('productCategory').value;
            const stock = document.getElementById('productStock').value;
            
            if (!name || !price) {
                alert('Ном ва нарх зарур аст!');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price, image, category, stock })
                });
                
                if (response.ok) {
                    alert('Маҳсулот илова шуд!');
                    closeAdmin();
                    loadProducts();
                }
            } catch (error) {
                alert('Хатогӣ дар илова кардани маҳсулот!');
            }
        }
        
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'success-message';
            notification.textContent = message;
            notification.style.position = 'fixed';
            notification.style.top = '20px';
            notification.style.right = '20px';
            notification.style.zIndex = '9999';
            document.body.appendChild(notification);
            
            setTimeout(() => notification.remove(), 2000);
        }
        
        // Бор кардани маҳсулот ҳангоми оғози саҳифа
        loadProducts();
    </script>
</body>
</html>
